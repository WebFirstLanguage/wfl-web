<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page_title }}</title>
  <meta name="description" content="{{ page_desc }}" />
  <meta property="og:title" content="{{ page_title }}" />
  <meta property="og:description" content="{{ page_desc }}" />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/svg+xml" href="/assets/ds/assets/wfl-mark.svg" />
  <link rel="stylesheet" href="/assets/ds/styles.css" />
  <link rel="stylesheet" href="/assets/site.css" />
</head>
<body>
{# The three non-negotiable regions, in order: header → body → footer.
   Contract lives in the Scriptorium theme guidelines (docs/THEMING.md). #}
{% include "templates/partials/header.html" %}
<main class="site-body">
{% block content %}{% endblock %}
</main>
{% include "templates/partials/footer.html" %}
</body>
</html>
