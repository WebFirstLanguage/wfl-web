{% extends "admin/templates/admin_layout.html" %}
{% block title %}{{ form_title }}{% endblock %}
{% block heading %}{{ form_title }}{% endblock %}
{% block content %}
<form method="post" action="{{ action_url }}" class="form form--wide">
  <input type="hidden" name="csrf_token" value="{{ site.csrf }}">
  <label class="field">
    <span>Title</span>
    <input name="title" value="{{ post.title }}" required autofocus>
  </label>
  <label class="field">
    <span>Slug <em class="hint">leave blank to generate from the title</em></span>
    <input name="slug" value="{{ post.slug }}" placeholder="auto-from-title" class="mono">
  </label>
  <label class="field">
    <span>Body <em class="hint">Markdown — **bold**, *italic*, [links](/x), lists, `code`</em></span>
    <textarea name="body_markdown" rows="18">{{ post.body_markdown }}</textarea>
  </label>
  <div class="field field--inline">
    <span>Status</span>
    <select name="status">
      <option value="draft"{% if post.status == 'draft' %} selected{% endif %}>Draft</option>
      <option value="published"{% if post.status == 'published' %} selected{% endif %}>Published</option>
    </select>
  </div>
  <div class="form__actions">
    <button class="btn btn--primary" type="submit">Save post</button>
    <a class="btn btn--ghost" href="/admin/posts">Cancel</a>
  </div>
</form>
{% if post.id %}
<form method="post" action="/admin/posts/{{ post.id }}/delete" class="form--danger" onsubmit="return confirm('Delete this post permanently?')">
  <input type="hidden" name="csrf_token" value="{{ site.csrf }}">
  <button class="btn btn--danger" type="submit">Delete post</button>
</form>
{% endif %}
{% include "admin/templates/_media_panel.html" %}
{% endblock %}
