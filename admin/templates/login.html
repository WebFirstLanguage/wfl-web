<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in · {{ site.title }}</title>
<link rel="icon" href="{{ site.asset_base }}/ds/assets/wfl-mark.svg">
<link rel="stylesheet" href="{{ site.asset_base }}/ds/styles.css">
<link rel="stylesheet" href="{{ site.asset_base }}/admin.css">
</head>
<body class="admin admin--auth">
<div class="auth-card">
  <div class="auth-card__glow"></div>
  <a class="brand" href="/">
    <img src="{{ site.asset_base }}/ds/assets/wfl-mark.svg" alt="">
    <span class="brand__name">{{ site.title }}</span>
  </a>
  <h1 class="auth-card__title">Sign in</h1>
  <p class="auth-card__sub">Welcome back. Sign in to manage your site.</p>
  {% if flash %}<div class="flash flash--{{ flash.kind }}">{{ flash.message }}</div>{% endif %}
  <form method="post" action="/admin/login" class="form">
    <input type="hidden" name="csrf_token" value="{{ csrf }}">
    <label class="field">
      <span>Username</span>
      <input name="username" value="{{ form.username }}" autofocus autocomplete="username">
    </label>
    <label class="field">
      <span>Password</span>
      <input type="password" name="password" autocomplete="current-password">
    </label>
    <button class="btn btn--primary btn--block" type="submit">Sign in</button>
  </form>
</div>
</body>
</html>
