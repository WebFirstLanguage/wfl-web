<section class="panel">
  <div class="panel__head">
    <h2>Media</h2>
  </div>
  <p class="hint">Upload an image here, then reference it in the body as
  <code>![alt text](/assets/uploads/&hellip;)</code> &mdash; the upload opens the
  <a href="/admin/media" target="_blank">media library</a> in a new tab, so your draft above stays put.</p>
  <form method="post" action="/admin/media/upload" enctype="multipart/form-data" target="_blank" class="form">
    <input type="hidden" name="csrf_token" value="{{ site.csrf }}">
    <div class="field field--inline">
      <input type="file" name="file" accept=".png,.jpg,.jpeg,.gif,.webp" required>
      <button class="btn btn--ghost" type="submit">Upload</button>
    </div>
  </form>
</section>
